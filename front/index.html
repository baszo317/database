<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.L.I.T - 智慧資金管理系統</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'DM Sans', 'Segoe UI', sans-serif;
        }

        body {
            background-color: #ffffff;
            height: 100vh;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }

        /* 綠底白字標題 */
        h1 {
            display: inline-block;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            background-color: #2ca42c;
            color: #ffffff;
            padding: 10px 40px;
            margin-bottom: 20px;
            border-radius: 6px;
        }

        /* 黑色副標題 */
        p {
            color: #000000;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 50px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .btn {
            padding: 14px 38px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            text-align: center;
            min-width: 160px;
        }

        /* 主按鈕：黑底白字，hover 變綠 */
        .btn-primary {
            background-color: #000000;
            color: #ffffff;
            border: 2px solid #000000;
        }

        .btn-primary:hover {
            background-color: #2ca42c;
            border-color: #2ca42c;
            transform: translateY(-2px);
        }

        /* 副按鈕：白底黑框 */
        .btn-secondary {
            background-color: #ffffff;
            color: #000000;
            border: 2px solid #000000;
        }

        .btn-secondary:hover {
            background-color: #f4f4f5;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>S.P.L.I.T</h1>
        <p>Smart Planner for Ledger, Income, and Tracking</p>

        <div class="btn-group">
            <a href="dashboard.html" class="btn btn-primary" id="startBtn">GET STARTED</a>
            <a href="auth.html" class="btn btn-secondary">SETTINGS / LOGIN</a>
        </div>
    </div>

    <script>
        // 已登入 → GET STARTED 直接去 dashboard；未登入 → 去 auth
        const token = localStorage.getItem('split_token');
        const startBtn = document.getElementById('startBtn');
        if (!token) {
            startBtn.href = 'auth.html';
            startBtn.textContent = '立即開始';
        }
    </script>
</body>
</html>
